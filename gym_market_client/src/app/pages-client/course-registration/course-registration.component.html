<div class="wrapper">
  <div class="container">
    <div class="search-bar">
      <div class="form-group flex-1">
        <input
          [(ngModel)]="searchString"
          (keydown.enter)="searchCourse()"
          type="text"
          class="form-input"
          placeholder="Search your registered courses..."
        />
      </div>
      <gm-button variant="primary" (clicked)="searchCourse()">SEARCH</gm-button>
    </div>

    <div class="registration-grid">
      @for (item of courseSearchs; track item.courseId) {
      <div class="registration-card" [routerLink]="['/client/course-details', item.courseId]">
        <div 
          class="registration-card__status"
          [ngClass]="item.statusPayment === 'Canceled' ? 'registration-card__status--canceled' : 'registration-card__status--success'"
        >
          {{ item.statusPayment }}
        </div>
        
        <div class="registration-card__img-wrap">
          <img
            [src]="item.getFileDtos && item.getFileDtos.length > 0 ? item.getFileDtos[0].url : '/assets/gym_logo.png'"
            alt="Course thumbnail"
          />
        </div>
        
        <div class="registration-card__content">
          <h5 class="registration-card__title">
            {{ item.title }}
          </h5>
          <p class="registration-card__description">
            {{ item.description }}
          </p>
          
          <div class="mt-4">
            <gm-button variant="ghost" class="w-full">VIEW COURSE</gm-button>
          </div>
        </div>
      </div>
      }
    </div>

    @if (courseSearchs.length === 0) {
      <div class="text-center py-20">
        <p class="text-secondary font-medium">No registered courses found.</p>
        <gm-button variant="primary" routerLink="/client/course-search" class="mt-4">BROWSE ALL COURSES</gm-button>
      </div>
    }
  </div>
</div>
