<div class="trainer-list-page">
  <header class="search-header">
    <div class="search-header__bar gl">
      <div class="form-group flex-1">
        <input
          (keydown.enter)="onSubmit()"
          class="form-input"
          type="text"
          placeholder="SEARCH ELITE TRAINERS..."
          [(ngModel)]="searchString"
        />
      </div>
      <gm-button variant="primary" (clicked)="onSubmit()">SEARCH</gm-button>
    </div>
  </header>

  <main class="container">
    <div class="trainer-grid">
      @for (item of trainers; track $index) {
      <gm-card class="trainer-card gl" [routerLink]="['/client/trainer-details', item.trainerId]">
        <div class="trainer-card__image-wrap">
          <img
            [src]="item.profilePicture || '/assets/fitness_logo.jpg'"
            alt="Trainer profile"
          />
        </div>
        
        <div class="trainer-card__content">
          <h3 class="trainer-card__name">{{ item.name }}</h3>

          <div class="trainer-card__info-section">
            <h4>Certifications</h4>
            <p>{{ item.certification || 'Elite Fitness Professional' }}</p>
          </div>

          <div class="trainer-card__info-section">
            <h4>Bio</h4>
            <p>{{ item.bio }}</p>
          </div>

          <div class="trainer-card__footer">
            <gm-button variant="ghost" class="w-full">VIEW PROFILE</gm-button>
          </div>
        </div>
      </gm-card>
      }
    </div>
  </main>
</div>
