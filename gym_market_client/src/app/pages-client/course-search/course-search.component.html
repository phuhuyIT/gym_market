<div class="course-search-page">
  <header class="search-header">
    <div class="section-head">
      <span class="section-tag">Explore Marketplace</span>
      <h1 class="section-title">FIND YOUR <em>FIT</em></h1>
    </div>

    <div class="search-header__bar gl" appReveal>
      <input
        (keydown.enter)="onSubmit()"
        class="form-input"
        type="text"
        placeholder="SEARCH PREMIUM COURSES..."
        [(ngModel)]="searchString"
      />
      <button class="btn-primary" (click)="onSubmit()" style="padding: 10px 24px;">Search</button>
    </div>

    <div class="category-strip gl" appReveal [style.transitionDelay]="'0.2s'">
      @for (cat of categories; track cat) {
        <button 
          class="cat-pill btn-ghost" 
          [class.active]="category === cat"
          (click)="onSelectCategory(cat)">
          {{ cat }}
        </button>
      }
    </div>
  </header>

  <main class="container">
    <div class="course-grid">
      @for (item of courses; track $index) {
        <gm-card class="course-card" [routerLink]="['/client/course-details', item.courseId]" appReveal [style.transitionDelay]="$index * 0.05 + 's'">
          <div class="course-card__image-wrap">
            <img [src]="item.getFileDtos[0].url || '/assets/gym_logo.png'" alt="Course cover" />
          </div>
          
          <div class="course-card__content">
            <span class="course-card__category">{{ item.category }}</span>
            <h3 class="course-card__title">{{ item.title }}</h3>
            <p class="step-text" style="font-size: 0.85rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
              {{ item.description }}
            </p>

            <div class="course-card__meta">
              <span class="course-card__price">{{ item.price | currency:'USD' }}</span>
              <button class="btn-ghost" style="padding: 8px 16px; font-size: 0.8rem;">Details</button>
            </div>
          </div>
        </gm-card>
      }
    </div>

    <div class="pagination" *ngIf="courses.length > 0">
      <button class="btn-ghost" (click)="prevPage()" [disabled]="pageIndex === 1">Previous</button>
      <span style="font-family: 'DM Sans', sans-serif; font-weight: 700;">Page {{ pageIndex }}</span>
      <button class="btn-ghost" (click)="nexPage()">Next</button>
    </div>
  </main>
</div>
