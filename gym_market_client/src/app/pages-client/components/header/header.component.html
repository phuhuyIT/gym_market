<header class="navbar">
	<div class="container w-full flex items-center justify-between">
		<a class="navbar__logo flex items-center gap-3" routerLink="/home">
			<img class="w-12 h-12" src="/assets/fitness_logo.jpg" alt="Logo" />
			<span class="hidden md:inline">FITNESS FOR LIFE</span>
		</a>

		<nav class="flex items-center gap-2">
			@for (item of navbarItems; track $index) {
			<a [routerLink]="item.link" routerLinkActive="active" class="navbar__link">
				{{ item.name }}
			</a>
			}

			<div class="relative ml-2">
				<div
					class="ai-trigger"
					(mouseover)="showAIDropdownMenu = true"
					(mouseleave)="showAIDropdownMenu = false"
				>
					<span>AI</span>
					<svg
						aria-hidden="true"
						xmlns="http://www.w3.org/2000/svg"
						fill="none"
						viewBox="0 0 24 24"
					>
						<path
							stroke="currentColor"
							stroke-linecap="round"
							stroke-linejoin="round"
							stroke-width="2"
							d="M12 18.5A2.493 2.493 0 0 1 7.51 20H7.5a2.468 2.468 0 0 1-2.4-3.154 2.98 2.98 0 0 1-.85-5.274 2.468 2.468 0 0 1 .92-3.182 2.477 2.477 0 0 1 1.876-3.344 2.5 2.5 0 0 1 3.41-1.856A2.5 2.5 0 0 1 12 5.5m0 13v-13m0 13a2.493 2.493 0 0 0 4.49 1.5h.01a2.468 2.468 0 0 0 2.403-3.154 2.98 2.98 0 0 0 .847-5.274 2.468 2.468 0 0 0-.921-3.182 2.477 2.477 0 0 0-1.875-3.344A2.5 2.5 0 0 0 14.5 3 2.5 2.5 0 0 0 12 5.5m-8 5a2.5 2.5 0 0 1 3.48-2.3m-.28 8.551a3 3 0 0 1-2.953-5.185M20 10.5a2.5 2.5 0 0 0-3.481-2.3m.28 8.551a3 3 0 0 0 2.954-5.185"
						/>
					</svg>
				</div>

				<div
					class="ai-dropdown-menu"
					[ngClass]="{ 'visible': showAIDropdownMenu }"
					(mouseover)="showAIDropdownMenu = true"
					(mouseleave)="showAIDropdownMenu = false"
				>
					@for (item of aiMenu; track $index) {
					<a [routerLink]="item.link" class="account_option_item">
						{{ item.name }}
					</a>
					}
				</div>
			</div>
		</nav>

		<div class="flex items-center gap-4">
			<button class="btn-icon" (click)="themeService.toggle()" aria-label="Toggle theme">
				@if (!themeService.isDark()) {
				<svg
					class="w-6 h-6"
					fill="none"
					stroke="currentColor"
					viewBox="0 0 24 24"
					xmlns="http://www.w3.org/2000/svg"
				>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						stroke-width="2"
						d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
					></path>
				</svg>
				} @else {
				<svg
					class="w-6 h-6"
					fill="none"
					stroke="currentColor"
					viewBox="0 0 24 24"
					xmlns="http://www.w3.org/2000/svg"
				>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						stroke-width="2"
						d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
					></path>
				</svg>
				}
			</button>

			<div class="account">
				<div
					class="account-trigger"
					(mouseover)="onShowAccountOption()"
					(mouseleave)="onHiddenAccountOption()"
				>
					<span>{{ userStore.fullName() }}</span>
					<i class="fa-solid fa-caret-down"></i>
				</div>

				<div
					class="account_option"
					[ngClass]="{ 'visible': showAccountOption }"
					(mouseover)="onShowAccountOption()"
					(mouseleave)="onHiddenAccountOption()"
				>
					<a routerLink="/client/your-profile" class="account_option_item">Profile Info</a>
					<a routerLink="/chat/chat-list" class="account_option_item">Chats</a>
					<button (click)="logout()" class="account_option_item">Logout</button>
				</div>
			</div>
		</div>
	</div>
</header>
