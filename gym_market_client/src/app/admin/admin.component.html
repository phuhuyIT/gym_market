<div class="min-h-screen bg-[#F7F6F3] dark:bg-[#0E0E10] text-neutral-900 dark:text-neutral-100 flex">
	<aside class="hidden lg:flex w-72 shrink-0 flex-col border-r border-neutral-200/70 dark:border-neutral-800/70 bg-white dark:bg-[#161618] p-6">
		<div class="mb-8 flex items-center gap-3">
			<div class="h-10 w-10 rounded-xl bg-[#007AFF] text-white flex items-center justify-center font-bold">GM</div>
			<div>
				<p class="text-lg font-bold">GymMarket</p>
				<p class="text-xs font-semibold uppercase text-neutral-400">Admin</p>
			</div>
			<div class="ml-auto"><app-notification-bell mode="fixed"></app-notification-bell></div>
		</div>

		<nav class="space-y-1">
			@for (item of navItems; track item.path) {
				<a
					[routerLink]="item.path"
					routerLinkActive="bg-blue-50 text-[#007AFF] dark:bg-blue-950/30 dark:text-blue-300"
					class="block rounded-xl px-3 py-2.5 text-sm font-semibold text-neutral-600 dark:text-neutral-300 hover:bg-neutral-50 dark:hover:bg-neutral-800/60"
				>
					{{ item.label }}
				</a>
			}
		</nav>

		<div class="mt-auto space-y-4 border-t border-neutral-200/70 dark:border-neutral-800/70 pt-4">
			<div class="flex items-center justify-between rounded-xl bg-neutral-50 dark:bg-neutral-800/40 px-3 py-2">
				<span class="text-xs font-semibold text-neutral-500">Theme</span>
				<app-theme-toggle></app-theme-toggle>
			</div>
			<button (click)="logout()" class="w-full rounded-xl px-3 py-2.5 text-left text-sm font-semibold text-red-500 hover:bg-red-50 dark:hover:bg-red-950/20">
				Logout
			</button>
		</div>
	</aside>

	<div class="flex min-w-0 flex-1 flex-col">
		<header class="sticky top-0 z-30 flex h-16 items-center gap-3 border-b border-neutral-200/70 dark:border-neutral-800/70 bg-white/90 dark:bg-[#161618]/90 px-4 backdrop-blur lg:hidden">
			<button (click)="isMobileMenuOpen.set(!isMobileMenuOpen())" class="rounded-xl px-3 py-2 text-sm font-semibold bg-neutral-100 dark:bg-neutral-800">Menu</button>
			<p class="font-bold">Admin</p>
			<div class="ml-auto flex items-center gap-3">
				<app-notification-bell mode="fixed"></app-notification-bell>
				<app-theme-toggle></app-theme-toggle>
			</div>
		</header>

		@if (isMobileMenuOpen()) {
			<nav class="lg:hidden border-b border-neutral-200/70 dark:border-neutral-800/70 bg-white dark:bg-[#161618] p-3">
				@for (item of navItems; track item.path) {
					<a [routerLink]="item.path" (click)="isMobileMenuOpen.set(false)" class="block rounded-xl px-3 py-2 text-sm font-semibold">
						{{ item.label }}
					</a>
				}
			</nav>
		}

		<main class="flex-1 p-4 md:p-6 lg:p-8">
			<router-outlet></router-outlet>
		</main>
	</div>
</div>
