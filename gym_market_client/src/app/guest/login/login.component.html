<div class="login">
  <div class="login__brand">
    <h1 class="login__wordmark">GYM<br>MARKET</h1>
    <p class="login__tagline">Connect. Train. Grow.</p>
  </div>
  <div class="login__form-panel">
    <div class="login__form-content">
      <h2 class="login__title">Welcome back</h2>
      <p class="login__subtitle">Enter your credentials to access your account</p>
      
      <div class="login__fields">
        <gm-input label="Email" type="email" [(value)]="model.email" />
        <gm-input label="Password" type="password" [(value)]="model.password" />
      </div>

      <gm-button variant="primary" [loading]="loading" (clicked)="onLogin()">Sign In</gm-button>
      
      <div class="login__footer">
        <a routerLink="/sign-up">No account? <span class="accent">Sign up</span></a>
      </div>
    </div>
  </div>
</div>
