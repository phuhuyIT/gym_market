<div class="nav-wrap">
  <nav>
    <a routerLink="/" class="nav-logo">Gym<span>Market</span></a>

    <ul class="nav-links">
      <li><a routerLink="/home">Home</a></li>
      
      <!-- AI Features Dropdown -->
      <li class="relative" (mouseover)="showAIDropdownMenu = true" (mouseleave)="showAIDropdownMenu = false">
        <button class="dropdown-trigger">AI Features</button>
        <div class="dropdown-menu gl" [ngClass]="{'hidden': !showAIDropdownMenu}">
          @for (item of aiMenu; track $index) {
            <a [routerLink]="item.link" class="dropdown-item">{{ item.name }}</a>
          }
        </div>
      </li>

      <li><app-theme-toggle></app-theme-toggle></li>

      @if(user.id()) {
        <li class="relative" (mouseover)="showAccountOption = true" (mouseleave)="showAccountOption = false">
          <button class="nav-cta">{{ user.fullName() }}</button>
          <div class="dropdown-menu gl" [ngClass]="{'hidden': !showAccountOption}">
            <a routerLink="/client/your-profile" class="dropdown-item">Profile Info</a>
            <a routerLink="/client/course-registration" class="dropdown-item">My courses</a>
            <a routerLink="/chat/chat-list" class="dropdown-item">Chats</a>
            <button (click)="logout()" class="dropdown-item">Logout</button>
          </div>
        </li>
      } @else {
        <li class="relative" (mouseover)="showAccountOption = true" (mouseleave)="showAccountOption = false">
          <button class="nav-cta">Account</button>
          <div class="dropdown-menu gl" [ngClass]="{'hidden': !showAccountOption}">
            <a routerLink="/login" class="dropdown-item">Sign in</a>
            <a routerLink="/sign-up" class="dropdown-item">Sign up</a>
          </div>
        </li>
      }
    </ul>
  </nav>
</div>
