<div class="course-form">
  <div class="container container--narrow">
    <header class="course-form__header">
      <div class="back-link" routerLink="/agency/course-list">← Back to Dashboard</div>
      <h1 class="course-form__title">Add New Course</h1>
      <p class="course-form__subtitle">Define your course details, pricing, and schedule.</p>
    </header>

    <div class="course-form__content">
      <!-- General Information -->
      <section class="form-section">
        <h3 class="form-section__title">GENERAL INFORMATION</h3>
        <div class="form-grid">
          <div class="full-width">
            <gm-input label="COURSE TITLE" [(value)]="model.title" />
          </div>
          <div class="full-width">
            <gm-input label="DESCRIPTION" [(value)]="model.description" />
          </div>
          <div class="custom-select">
            <label>TYPE</label>
            <select [(ngModel)]="model.type">
              <option value="Yoga">Yoga</option>
              <option value="Cardio">Cardio</option>
              <option value="Strength">Strength training</option>
              <option value="Pilates">Pilates</option>
              <option value="Stretching">Stretching</option>
              <option value="Cross fit">Cross fit</option>
            </select>
          </div>
          <div class="custom-select">
            <label>CATEGORY</label>
            <select [(ngModel)]="model.category">
              <option value="Yoga">Yoga</option>
              <option value="Cardio">Cardio</option>
              <option value="Strength">Strength training</option>
              <option value="Pilates">Pilates</option>
              <option value="Stretching">Stretching</option>
              <option value="Cross fit">Cross fit</option>
            </select>
          </div>
        </div>
      </section>

      <!-- Pricing & Capacity -->
      <section class="form-section">
        <h3 class="form-section__title">PRICING & CAPACITY</h3>
        <div class="form-grid">
          <gm-input label="BASE PRICE ($)" type="number" [(value)]="model.price" />
          <gm-input label="ADDITIONAL PRICE ($)" type="number" [(value)]="model.additionalPrice" />
          <gm-input label="MAX PARTICIPANTS" type="number" [(value)]="model.maxParticipants" />
          <gm-input label="DURATION (DAYS)" type="number" [(value)]="model.duration" />
        </div>
      </section>

      <!-- Schedule -->
      <section class="form-section">
        <h3 class="form-section__title">SCHEDULE</h3>
        <div class="form-grid">
          <gm-input label="START DATE" type="date" [(value)]="model.startDate" />
          <gm-input label="END DATE" type="date" [(value)]="model.endDate" />
        </div>
      </section>

      <!-- Media Upload (Placeholder UI) -->
      <section class="form-section">
        <h3 class="form-section__title">COURSE MEDIA</h3>
        <div class="upload-zone">
          <div class="upload-zone__icon">📤</div>
          <p class="upload-zone__text">Drag and drop images or videos, or <span>browse</span></p>
          <p class="upload-zone__subtext">Recommended: 16:9 aspect ratio, max 5MB per file.</p>
        </div>
      </section>

      <!-- Form Actions -->
      <div class="form-actions">
        <gm-button variant="ghost" routerLink="/agency/course-list">CANCEL</gm-button>
        <gm-button variant="primary" [loading]="loading" (clicked)="submit()">SAVE COURSE</gm-button>
      </div>
    </div>
  </div>
</div>
