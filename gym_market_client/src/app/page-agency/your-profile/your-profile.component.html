<div class="wrapper" *ngIf="userInfo && trainerInfo">
  <div class="container">
    <div class="profile-card">
      <div class="profile-grid">
        <!-- Sidebar -->
        <aside class="avatar-section">
          <img [src]="trainerInfo.profilePicture || '/assets/fitness_logo.jpg'" alt="Trainer profile">
          
          <gm-button variant="secondary" routerLink="/agency/update-profile" class="w-full">
            EDIT PROFILE
          </gm-button>
        </aside>

        <!-- Main Info -->
        <main class="info-section">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" [value]="userInfo.fullName" disabled />
          </div>

          <div class="form-group">
            <label class="form-label">Address</label>
            <input type="text" class="form-input" [value]="userInfo.address || 'Global'" disabled />
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Email Address</label>
              <input type="text" class="form-input" [value]="userInfo.email" disabled />
            </div>

            <div class="form-group">
              <label class="form-label">Phone Number</label>
              <input type="text" class="form-input" [value]="userInfo.phoneNumber || 'Not provided'" disabled />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Professional Bio</label>
            <textarea class="form-input" rows="3" disabled>{{ trainerInfo.bio }}</textarea>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Rating</label>
              <div class="flex items-center gap-2">
                <span class="text-2xl font-bold text-accent-500">{{ trainerInfo.rating || '0.0' }} ★</span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Years of Experience</label>
              <input type="text" class="form-input" [value]="trainerInfo.experience" disabled />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Certifications</label>
            <div class="form-input bg-overlay min-h-[100px] whitespace-pre-wrap">
              {{ trainerInfo.certification }}
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>
</div>
