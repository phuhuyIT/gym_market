<div class="course-form">
  <div class="container container--narrow">
    <header class="course-form__header">
      <div class="back-link" routerLink="/agency/course-list">← Back to Dashboard</div>
      <h1 class="course-form__title">Update Course</h1>
      <p class="course-form__subtitle">Modify your course details, pricing, or schedule.</p>
    </header>

    <div class="course-form__content">
      <!-- General Information -->
      <section class="form-section">
        <h3 class="form-section__title">GENERAL INFORMATION</h3>
        <div class="form-grid">
          <div class="full-width">
            <gm-input label="COURSE TITLE" [(value)]="model.title" />
          </div>
          <div class="full-width">
            <gm-input label="DESCRIPTION" [(value)]="model.description" />
          </div>
          <div class="custom-select">
            <label>TYPE</label>
            <select [(ngModel)]="model.type">
              <option value="Yoga">Yoga</option>
              <option value="Cardio">Cardio</option>
              <option value="Strength">Strength training</option>
              <option value="Pilates">Pilates</option>
              <option value="Stretching">Stretching</option>
              <option value="Cross fit">Cross fit</option>
            </select>
          </div>
          <div class="custom-select">
            <label>CATEGORY</label>
            <select [(ngModel)]="model.category">
              <option value="Yoga">Yoga</option>
              <option value="Cardio">Cardio</option>
              <option value="Strength">Strength training</option>
              <option value="Pilates">Pilates</option>
              <option value="Stretching">Stretching</option>
              <option value="Cross fit">Cross fit</option>
            </select>
          </div>
        </div>
      </section>

      <!-- Pricing & Capacity -->
      <section class="form-section">
        <h3 class="form-section__title">PRICING & CAPACITY</h3>
        <div class="form-grid">
          <gm-input label="BASE PRICE ($)" type="number" [(value)]="model.price" />
          <gm-input label="ADDITIONAL PRICE ($)" type="number" [(value)]="model.additionalPrice" />
          <gm-input label="MAX PARTICIPANTS" type="number" [(value)]="model.maxParticipants" />
          <gm-input label="DURATION (DAYS)" type="number" [(value)]="model.duration" />
        </div>
      </section>

      <!-- Schedule -->
      <section class="form-section">
        <h3 class="form-section__title">SCHEDULE</h3>
        <div class="form-grid">
          <gm-input label="START DATE" type="date" [(value)]="model.startDate" />
          <gm-input label="END DATE" type="date" [(value)]="model.endDate" />
        </div>
      </section>

      <!-- Media Upload -->
      <section class="form-section">
        <h3 class="form-section__title">COURSE MEDIA</h3>
        
        <div class="media-row">
          <div class="media-col">
            <label class="media-label">IMAGES</label>
            <div class="upload-zone upload-zone--small" (click)="imageInput.click()">
              <div class="upload-zone__icon">🖼️</div>
              <p class="upload-zone__text">Add Images</p>
              <input type="file" #imageInput hidden multiple (change)="onSlectImage($event)" accept="image/*">
            </div>
            <div class="media-previews">
              <div class="media-preview" *ngFor="let img of dataImages" (click)="showImage(img)">
                <img [src]="img" alt="">
              </div>
            </div>
            <gm-button variant="ghost" *ngIf="dataImages.length > 0" (clicked)="onClearImages(imageInput)">CLEAR ALL</gm-button>
          </div>

          <div class="media-col">
            <label class="media-label">VIDEOS</label>
            <div class="upload-zone upload-zone--small" (click)="videoInput.click()">
              <div class="upload-zone__icon">🎥</div>
              <p class="upload-zone__text">Add Videos</p>
              <input type="file" #videoInput hidden multiple (change)="onSlectVideo($event)" accept="video/*">
            </div>
            <div class="media-previews">
              <div class="media-preview media-preview--video" *ngFor="let vid of dataVideos">
                <video [src]="vid"></video>
              </div>
            </div>
            <gm-button variant="ghost" *ngIf="dataVideos.length > 0" (clicked)="onClearVideo(videoInput)">CLEAR ALL</gm-button>
          </div>
        </div>
      </section>

      <!-- Form Actions -->
      <div class="form-actions">
        <gm-button variant="ghost" routerLink="/agency/course-list">CANCEL</gm-button>
        <gm-button variant="primary" [loading]="loading" (clicked)="submit()">UPDATE COURSE</gm-button>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="image-modal" *ngIf="url" (click)="showImage(null)">
  <div class="image-modal__close">✕</div>
  <img [src]="url" alt="Fullscreen preview" (click)="$event.stopPropagation()">
</div>
